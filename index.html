<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具激活</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
html,body{
  width:100%;
  height:100%;
  background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  padding: 20px;
}

.activate-box{
  background:#fff;
  border-radius:20px;
  box-shadow:0 12px 35px rgba(0,0,0,0.06);
  padding:44px 36px;
  width:100%;
  max-width:420px;
  text-align:center;
}
.activate-box h2{
  font-size:24px;
  margin-bottom:10px;
  color:#1f2329;
  font-weight:600;
}
.activate-box p{
  color:#6e7683;
  margin-bottom:32px;
  font-size:15px;
  line-height:1.5;
}

input{
  width:100%;
  padding:16px 18px;
  border:1px solid #e2e8f0;
  border-radius:12px;
  font-size:15px;
  margin-bottom:18px;
  transition: all 0.2s;
  outline:none;
  text-align:center;
  letter-spacing:1px;
}
input:focus{
  border-color:#2d6fff;
  box-shadow:0 0 0 3px rgba(45,111,255,0.1);
}

button{
  width:100%;
  padding:16px;
  background:#2d6fff;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  margin-bottom:12px;
  transition: background 0.2s;
}
button:hover{
  background:#2563e0;
}
.btn-preview{
  background:#f1f5f9;
  color:#4e5969;
}
.btn-preview:hover{
  background:#e2e8f0;
}
button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.tip{
  margin-top:20px;
  text-align:center;
  font-size:14px;
  color:#ff4444;
  font-weight:500;
  min-height:18px;
}
.tip.success{
  color:#00b96b;
}

#mainContent{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#fff;
  padding:40px 20px;
  overflow:auto;
}
</style>
</head>

<body>

<div id="activatePanel">
  <div class="activate-box">
    <h2>工具激活</h2>
    <p>请输入激活码以解锁全部功能</p >
    <input type="text" id="codeInput" placeholder="请输入激活码" autocomplete="off">
    <button onclick="doActive()">立即激活</button>
    <button class="btn-preview" id="previewBtn" onclick="startPreview()">试用5秒预览</button>
    <div id="tip" class="tip"></div>
  </div>
</div>

<div id="mainContent">
  <h2>已激活 · 正常使用</h2>
  <br>
  <p><!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>氪金戒断模拟器</title>
<style>
*{box-sizing:border-box;font-family:微软雅黑,sans-serif}
body{background:#111;color:#fff;max-width:480px;margin:0 auto;padding:20px}
.box{background:#1a1a2e;border-radius:16px;padding:24px}
.title{text-align:center;font-size:22px;color:#ff4444;margin-bottom:10px}
.desc{text-align:center;color:#999;margin-bottom:16px}
.set{display:flex;gap:8px;margin-bottom:16px}
.set input{width:100%;padding:8px;border-radius:8px;border:none;background:#222;color:#fff;text-align:center}
.btns{display:flex;gap:12px;margin-bottom:16px}
button{flex:1;padding:14px;border:none;border-radius:12px;background:#222;color:#fff;font-size:16px;cursor:pointer}
button.ten{background:#c43e3e}
.pool{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.card{aspect-ratio:7/10;background:#222;border-radius:8px;display:grid;place-items:center;color:#777;font-size:12px;padding:4px;text-align:center}
.star5{background:linear-gradient(135deg,#813,#ffc107);color:#fff}
.star4{background:linear-gradient(135deg,#516,#d89cfd);color:#fff}
.taunt{color:#ff6666;text-align:center;font-size:16px;font-weight:bold;margin:10px 0;height:20px}
.info{color:#ccc;text-align:center;margin-bottom:8px;font-size:15px}
.log{background:#151522;padding:12px;border-radius:10px;height:180px;overflow-y:auto;margin-bottom:16px}

/* 使用说明样式 */
.manual{
  background:#222;
  border-left:4px solid #ff4444;
  padding:12px 14px;
  border-radius:8px;
  margin-top:20px;
  font-size:14px;
  line-height:1.5;
  color:#eee;
}
.manual h3{
  margin:0 0 6px;
  font-size:16px;
  color:#ff6666;
}
.manual p{margin:4px 0;}
</style>
</head>
<body>

<div class="box">
  <div class="title">🎮 氪金戒断模拟器</div>
  <div class="desc">越抽越非，瞬间不想氪金</div>

  <div class="set">
    <input type="number" id="money" placeholder="初始本金" value="1000">
    <input type="number" id="price1" placeholder="单抽价格" value="1">
    <input type="number" id="price10" placeholder="十连价格" value="10">
  </div>

  <div class="btns">
    <button onclick="drawOne()">单抽</button>
    <button class="ten" onclick="drawTen()">十连抽</button>
  </div>

  <div class="taunt" id="taunt"></div>
  <div class="info" id="balance">💰 剩余本金：1000</div>
  <div class="info" id="stat">⭐ 五星：0 | 🔹 四星：0</div>

  <div class="pool" id="pool"></div>
  <div class="log" id="log"></div>

  <!-- ====== 移到最底部的使用说明 ====== -->
  <div class="manual">
    <h3>📘 使用说明</h3>
    <p>1. 设置初始本金、单抽价格、十连价格，模拟真实抽卡消费。</p >
    <p>2. 点击【单抽】或【十连抽】按钮消耗本金进行抽卡。</p >
    <p>3. 90抽保底五星，整体爆率极低，越抽越非，快速戒氪。</p >
    <p>4. 本金耗尽后弹窗提示“戒氪成功”，解压戒赌神器。</p >
  </div>
</div>

<script>
let pity5 = 0
let count5 = 0
let count4 = 0

const taunts = [
  "别抽了，你就是非酋本酋",
  "收手吧，里面全是策划",
  "再抽就要吃一个月泡面",
  "你与欧皇彻底无缘",
  "别人十连双黄，你十连全蓝",
  "这钱买肉吃不香吗？",
  "你抽的不是卡，是生活费",
  "再抽真的要戒不了了",
  "保底都快吃满了还抽？",
  "这运气现实也很非吧"
]

function money() { return +document.getElementById('money').value }
function price1() { return +document.getElementById('price1').value }
function price10() { return +document.getElementById('price10').value }

function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)]
}

function randomTaunt() {
  if (Math.random() < 0.3) {
    document.getElementById("taunt").innerText = rand(taunts)
  } else {
    document.getElementById("taunt").innerText = ""
  }
}

function draw() {
  pity5++
  let r = Math.random()

  if (pity5 >= 90) {
    pity5 = 0
    count5++
    return { r:5, name: rand(["保底五星", "90抽才出金"]) }
  }
  if (r < 0.002) {
    pity5 = 0
    count5++
    return { r:5, name: "罕见五星" }
  }
  if (r < 0.045) {
    count4++
    return { r:4, name: "四星" }
  }
  return { r:3, name: "三星材料" }
}

function ten() {
  let list = []
  let has4 = false
  for (let i=0; i<10; i++) {
    let c = draw()
    if (c.r >=4) has4 = true
    list.push(c)
  }
  if (!has4) {
    list[9] = { r:4, name:"四星" }
    count4++
  }
  return list
}

function show(list) {
  let pool = document.getElementById('pool')
  pool.innerHTML = ''
  list.forEach(c => {
    let div = document.createElement('div')
    div.className = 'card star' + c.r
    div.innerText = c.name
    pool.appendChild(div)
  })

  randomTaunt()
  document.getElementById('stat').innerText = `⭐ 五星：${count5} | 🔹 四星：${count4}`
  document.getElementById('balance').innerText = `💰 剩余本金：${money()}`

  let log = document.getElementById('log')
  let txt = ''
  list.forEach(c => {
    if (c.r ==5) txt += `<p style="color:#ffc107">✅ 出金：${c.name}</p >`
    else if (c.r ==4) txt += `<p style="color:#d89cfd">🔹 四星：${c.name}</p >`
    else txt += `<p style="color:#666">♦️ 三星：${c.name}</p >`
  })
  log.innerHTML = txt + log.innerHTML
}

function drawOne() {
  if (money() < price1()) return alert('本金不足，戒氪成功！')
  document.getElementById('money').value = money() - price1()
  show([draw()])
}

function drawTen() {
  if (money() < price10()) return alert('本金不足，戒氪成功！')
  document.getElementById('money').value = money() - price10()
  show(ten())
}
</script>
</body>
</html></p >
</div>

const validCodes = [

"R5J2B9DS","G7N2F9DK","V3D7B2KS","J5K2S9FN","B3F7N2DS",
"M5V2D9SK","C7B2F9NK","K3S7V2DN","F5D2J9BS","W7N2K9FD"
];

const blacklist = [];

function getDeviceId() {
  return btoa(navigator.userAgent + screen.width + screen.height);
}

const bindRecord = JSON.parse(localStorage.getItem('bindRecord')) || {};
let hasPreviewed = localStorage.getItem('hasPreviewed') === 'true';

window.onload = function(){
  const code = localStorage.getItem('activeCode');
  const device = getDeviceId();

  if (hasPreviewed) {
    const btn = document.getElementById('previewBtn');
    btn.disabled = true;
    btn.innerText = '预览次数已用完';
  }

  if(code && bindRecord[code] === device && !blacklist.includes(code) && validCodes.includes(code)){
    document.getElementById('activatePanel').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  }
}

function doActive(){
  const code = document.getElementById('codeInput').value.trim();
  const tip = document.getElementById('tip');
  const device = getDeviceId();

  if(!code){ tip.innerText='请输入激活码'; return; }
  if(blacklist.includes(code)){ tip.innerText='激活码已禁用'; return; }
  if(!validCodes.includes(code)){ tip.innerText='激活码无效'; return; }
  if(bindRecord[code] && bindRecord[code]!==device){ tip.innerText='已绑定其他设备'; return; }

  bindRecord[code] = device;
  localStorage.setItem('bindRecord', JSON.stringify(bindRecord));
  localStorage.setItem('activeCode', code);

  tip.className = 'tip success';
  tip.innerText = '激活成功';
  setTimeout(()=>{
    document.getElementById('activatePanel').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  },500);
}

function startPreview(){
  if (hasPreviewed) return;

  hasPreviewed = true;
  localStorage.setItem('hasPreviewed', 'true');
  const btn = document.getElementById('previewBtn');
  btn.disabled = true;
  btn.innerText = '预览次数已用完';

  document.getElementById('activatePanel').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  setTimeout(()=>{
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('activatePanel').style.display = 'flex';
    document.getElementById('tip').innerText = '预览结束，请激活后使用';
  }, 5000);
}
</script>
</body>
</html>
